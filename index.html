<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f0f0f,#1c1c1c,#000);
padding:20px;
overflow:hidden;
}

body::before{
content:'';
position:absolute;
width:500px;
height:500px;
background:#ffb70033;
border-radius:50%;
filter:blur(120px);
top:-150px;
right:-100px;
}

.card{
position:relative;
width:100%;
max-width:420px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.1);
padding:35px;
border-radius:30px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.5);
animation:fadeIn 1.2s ease;
z-index:10;
}

.profile{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
border:4px solid #ffb700;
box-shadow:0 0 30px #ffb70080;
animation:float 3s ease-in-out infinite;
}

h1{
color:#fff;
margin-top:20px;
font-size:30px;
}

p{
color:#ccc;
margin-top:5px;
font-size:14px;
}

.socials{
margin-top:30px;
display:flex;
flex-direction:column;
gap:15px;
}

.socials a{
text-decoration:none;
padding:15px;
border-radius:15px;
font-weight:600;
font-size:16px;
transition:0.4s;
color:white;
}

.instagram{
background:linear-gradient(45deg,#fd1d1d,#c13584,#833ab4);
}

.facebook{
background:#1877f2;
}

.snapchat{
background:#fffc00;
color:black !important;
}

.whatsapp{
background:#25D366;
}

.email{
background:#444;
}

.socials a:hover{
transform:translateY(-5px) scale(1.03);
}

.footer{
margin-top:25px;
color:#888;
font-size:12px;
}

@keyframes float{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(-10px);
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>
